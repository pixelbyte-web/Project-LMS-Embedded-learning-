<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Enrollment System</title>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>📚 Course Enrollment System</h1>
        <p>Browse available courses and manage enrollments</p>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="s-total">—</div>
          <div class="stat-label">Total courses</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="s-enrolled">—</div>
          <div class="stat-label">Enrolled</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="s-available">—</div>
          <div class="stat-label">Available</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="s-students">—</div>
          <div class="stat-label">Students</div>
        </div>
      </div>

      <div class="controls">
        <div class="control-group">
          <label for="student-sel">Student</label>
          <select id="student-sel" onchange="window.onStudentChange()">
            <option value="">Select a student…</option>
          </select>
        </div>
        <div class="control-group">
          <label for="search">Search</label>
          <input
            type="text"
            id="search"
            placeholder="Course name or topic…"
            oninput="window.renderGrid()"
          />
        </div>
        <div class="control-group" style="max-width: 180px">
          <label for="filter">Filter</label>
          <select id="filter" onchange="window.renderGrid()">
            <option value="all">All courses</option>
            <option value="enrolled">Enrolled only</option>
            <option value="available">Available only</option>
          </select>
        </div>
      </div>

      <div id="content">
        <div class="msg">
          <span>🎓</span>Select a student above to view and manage enrollments.
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
