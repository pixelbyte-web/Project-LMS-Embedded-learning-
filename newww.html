<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PixelByte — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --p1: #7c3aed;
      --p2: #6366f1;
      --p3: #c084fc;
      --p4: #a78bfa;
      --bg: #faf9ff;
      --glass: rgba(255,255,255,0.68);
      --glass-border: rgba(124,58,237,0.14);
      --dark: #1a1033;
      --mid: #4a3f7a;
      --soft: #8b7fb5;
    }

    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--dark);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Gradient mesh background */
    .mesh {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 70% 60% at 15% 10%, rgba(192,132,252,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 60% 55% at 88% 85%, rgba(232,121,249,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 45% at 60% 50%, rgba(99,102,241,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Page ── */
    .page {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
      max-width: 560px;
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 3rem 3rem 2.4rem;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.6) inset,
        0 24px 80px rgba(99,102,241,0.10),
        0 4px 20px rgba(124,58,237,0.06);
      animation: cardIn 1s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo row ── */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      animation: fadeUp 0.9s 0.15s cubic-bezier(.22,1,.36,1) both;
    }

    .logo-img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(124,58,237,0.35));
      animation: floatLogo 5s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      33%      { transform: translateY(-6px) rotate(1deg); }
      66%      { transform: translateY(-3px) rotate(-0.5deg); }
    }

    .brand {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.65rem;
      letter-spacing: -0.035em;
      background: linear-gradient(135deg, var(--p1) 0%, var(--p2) 55%, var(--p3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,0.2), transparent);
      animation: fadeUp 0.9s 0.2s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(99,102,241,0.08));
      border: 1px solid rgba(124,58,237,0.2);
      color: var(--p1);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      animation: fadeUp 0.9s 0.25s cubic-bezier(.22,1,.36,1) both;
    }

    .badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--p1);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); box-shadow: 0 0 0 3px rgba(124,58,237,0.2); }
      50%      { transform: scale(1.15); box-shadow: 0 0 0 5px rgba(124,58,237,0.08); }
    }

    /* ── Heading ── */
    .heading {
      text-align: center;
      animation: fadeUp 0.9s 0.3s cubic-bezier(.22,1,.36,1) both;
    }

    .heading h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.6rem, 7vw, 4.2rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: var(--dark);
    }

    .heading h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--p1) 0%, var(--p2) 45%, var(--p3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .heading p {
      margin-top: 0.75rem;
      font-size: 0.975rem;
      color: var(--soft);
      font-weight: 400;
      line-height: 1.7;
      max-width: 380px;
      margin-inline: auto;
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      gap: 0.75rem;
      animation: fadeUp 0.9s 0.4s cubic-bezier(.22,1,.36,1) both;
    }

    .cd-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(124,58,237,0.12);
      border-radius: 16px;
      padding: 0.9rem 0.95rem 0.7rem;
      min-width: 70px;
      box-shadow: 0 2px 16px rgba(99,102,241,0.06), 0 1px 0 rgba(255,255,255,0.9) inset;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: default;
    }

    .cd-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(99,102,241,0.14), 0 1px 0 rgba(255,255,255,0.9) inset;
    }

    .cd-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(160deg, var(--p1), var(--p2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: transform 0.15s ease;
    }

    .cd-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
    }

    /* ── Email form ── */
    .form-wrap {
      width: 100%;
      animation: fadeUp 0.9s 0.5s cubic-bezier(.22,1,.36,1) both;
    }

    .form-inner {
      display: flex;
      gap: 0.5rem;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(124,58,237,0.16);
      border-radius: 100px;
      padding: 0.35rem 0.35rem 0.35rem 1.2rem;
      box-shadow: 0 2px 20px rgba(99,102,241,0.07);
      transition: box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .form-inner:focus-within {
      border-color: rgba(99,102,241,0.4);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.10), 0 2px 20px rgba(99,102,241,0.10);
    }

    .form-inner input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--dark);
      min-width: 0;
    }

    .form-inner input::placeholder {
      color: var(--soft);
    }

    .form-inner button {
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--p1), var(--p2));
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      letter-spacing: 0.01em;
      padding: 0.65rem 1.3rem;
      border-radius: 100px;
      box-shadow: 0 4px 18px rgba(99,102,241,0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
    }

    .form-inner button:hover {
      transform: scale(1.04);
      box-shadow: 0 6px 24px rgba(99,102,241,0.45);
    }

    .form-inner button:active {
      transform: scale(0.98);
    }

    /* success */
    .success {
      display: none;
      text-align: center;
      padding: 0.75rem;
      border-radius: 100px;
      background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(99,102,241,0.08));
      border: 1px solid rgba(124,58,237,0.18);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--p1);
    }
    .success.show { display: block; }

    /* ── Socials ── */
    .socials {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      animation: fadeUp 0.9s 0.6s cubic-bezier(.22,1,.36,1) both;
    }

    .soc-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
      margin-right: 0.1rem;
    }

    .soc-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(124,58,237,0.14);
      color: var(--mid);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.22s cubic-bezier(.22,1,.36,1);
      box-shadow: 0 2px 8px rgba(99,102,241,0.05);
    }

    .soc-btn:hover {
      transform: translateY(-3px) scale(1.1);
      background: linear-gradient(135deg, var(--p1), var(--p2));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 6px 18px rgba(99,102,241,0.35);
    }

    /* ── Footer ── */
    .footer-text {
      font-size: 0.72rem;
      color: var(--soft);
      letter-spacing: 0.04em;
      opacity: 0.75;
      animation: fadeUp 0.9s 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

    /* ── Countdown ── */
    const launch = new Date(Date.now() + 45*24*60*60*1000);
    const ids = ['cd-d','cd-h','cd-m','cd-s'];
    function pad(n){ return String(n).padStart(2,'0'); }
    function tick(){
      const d = launch - Date.now();
      if(d<=0) return;
      document.getElementById('cd-d').textContent = pad(Math.floor(d/86400000));
      document.getElementById('cd-h').textContent = pad(Math.floor((d%86400000)/3600000));
      document.getElementById('cd-m').textContent = pad(Math.floor((d%3600000)/60000));
      document.getElementById('cd-s').textContent = pad(Math.floor((d%60000)/1000));
    }
    tick(); setInterval(tick,1000);

    /* Digit flip on change */
    let prev = {};
    setInterval(()=>{
      ids.forEach(id=>{
        const el = document.getElementById(id);
        const v = el.textContent;
        if(prev[id]!==v){
          el.style.transform='scale(1.18)';
          setTimeout(()=>el.style.transform='',180);
          prev[id]=v;
        }
      });
    },500);

    /* ── Notify ── */
    function notify(){
      const v = document.getElementById('email').value;
      if(!v.includes('@')||!v.includes('.')) return;
      document.getElementById('form-inner').style.display='none';
      document.getElementById('success').classList.add('show');
    }

    /* ── Three.js ── */
    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.setClearColor(0,0);

    const scene = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
    cam.position.z = 24;

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dl = new THREE.DirectionalLight(0xc084fc, 1.4); dl.position.set(6,8,5); scene.add(dl);
    const pl1 = new THREE.PointLight(0x818cf8, 2.0, 70); pl1.position.set(-12,6,8); scene.add(pl1);
    const pl2 = new THREE.PointLight(0xe879f9, 1.5, 60); pl2.position.set(14,-7,4); scene.add(pl2);
    const pl3 = new THREE.PointLight(0x7c3aed, 1.2, 50); pl3.position.set(0,10,-5); scene.add(pl3);

    const mat = (color, op=0.38) => new THREE.MeshPhysicalMaterial({
      color, transparent:true, opacity:op,
      roughness:0.1, metalness:0.0,
      transmission:0.5, thickness:1.5,
      side: THREE.DoubleSide,
    });

    const shapes = [];
    const add = (geo, m, x,y,z, spd) => {
      const mesh = new THREE.Mesh(geo,m);
      mesh.position.set(x,y,z);
      mesh.userData = { spd, amp:0.3+Math.random()*0.7, off:Math.random()*Math.PI*2 };
      scene.add(mesh); shapes.push(mesh);
    };

    add(new THREE.TorusKnotGeometry(2.6,0.65,160,18,2,3), mat(0xa855f7,0.24), -8,4,-7, 0.004);
    add(new THREE.IcosahedronGeometry(2.1,1),              mat(0x818cf8,0.28),  8,-3,-5, 0.006);
    add(new THREE.TorusGeometry(2.2,0.5,24,80),            mat(0xc084fc,0.26), -9,-5,-6, 0.005);
    add(new THREE.OctahedronGeometry(1.8),                 mat(0x6366f1,0.35), 10, 6,-4, 0.007);
    add(new THREE.IcosahedronGeometry(1.0,0),              mat(0x7c3aed,0.40), -11,-4,-9, 0.009);
    add(new THREE.IcosahedronGeometry(1.2,0),              mat(0x7c3aed,0.35),  11, 7,-8, 0.008);
    [-2.5,0,2.5].forEach((ox,i)=>
      add(new THREE.SphereGeometry(0.5,32,32), mat(0xe879f9,0.42), 2+ox, 7+i*0.2, -2, 0.009+i*0.002)
    );
    const wm = new THREE.MeshBasicMaterial({color:0xa855f7, wireframe:true, transparent:true, opacity:0.07});
    add(new THREE.TorusGeometry(4,0.08,8,60), wm, 7,5,-10, 0.002);
    add(new THREE.TorusGeometry(1.3,0.1,10,60), mat(0xc084fc,0.5), -5,5,-3, 0.009);

    let mx=0,my=0;
    document.addEventListener('mousemove', e=>{
      mx=(e.clientX/innerWidth-0.5)*2;
      my=(e.clientY/innerHeight-0.5)*2;
    });

    const clock = new THREE.Clock();
    (function loop(){
      requestAnimationFrame(loop);
      const t = clock.getElapsedTime();
      shapes.forEach(m=>{
        m.rotation.x += m.userData.spd*0.6;
        m.rotation.y += m.userData.spd;
        m.position.y += Math.sin(t+m.userData.off)*0.0025*m.userData.amp;
      });
      cam.position.x += (mx*1.0 - cam.position.x)*0.035;
      cam.position.y += (-my*0.7 - cam.position.y)*0.035;
      cam.lookAt(0,0,0);
      renderer.render(scene,cam);
    })();

    addEventListener('resize',()=>{
      cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
    });
  </script>
</body>
</html>
