<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PixelByte — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#060510;
      --ink:#eeeaf8;
      --muted:#564f72;
      --faint:#1a1530;
      --teal:#0df2c0;
      --amber:#ffb347;
      --coral:#ff5e7e;
      --indigo:#7b5cfa;
      --glass:rgba(255,255,255,0.03);
      --gb:rgba(255,255,255,0.07);
    }

    html,body{
      height:100%;
      background:var(--bg);
      color:var(--ink);
      font-family:'Cabinet Grotesk',sans-serif;
      overflow:hidden;
      cursor:none;
    }

    #cur-dot,#cur-ring{
      position:fixed;pointer-events:none;z-index:9999;
      transform:translate(-50%,-50%);border-radius:50%;
    }
    #cur-dot{
      width:6px;height:6px;background:var(--teal);mix-blend-mode:screen;
    }
    #cur-ring{
      width:32px;height:32px;
      border:1px solid rgba(13,242,192,.4);mix-blend-mode:screen;
      transition:width .25s,height .25s,border-color .25s;
    }

    #bg{position:fixed;inset:0;z-index:0}

    .vig{
      position:fixed;inset:0;z-index:2;pointer-events:none;
      background:radial-gradient(ellipse 72% 72% at 50% 50%,transparent 38%,#060510 100%);
    }

    .grain{
      position:fixed;inset:-60%;width:220%;height:220%;
      z-index:3;pointer-events:none;opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation:gr .35s steps(1) infinite;
    }
    @keyframes gr{
      0%{transform:translate(0,0)}25%{transform:translate(-4%,-2%)}
      50%{transform:translate(2%,3%)}75%{transform:translate(-2%,1%)}
    }

    .br{position:fixed;width:48px;height:48px;z-index:8;pointer-events:none}
    .br::before,.br::after{content:'';position:absolute;background:rgba(13,242,192,.25)}
    .br::before{width:1px;height:100%}
    .br::after{width:100%;height:1px}
    .tl{top:22px;left:22px}
    .tr{top:22px;right:22px;transform:scaleX(-1)}
    .bl{bottom:22px;left:22px;transform:scaleY(-1)}
    .brx{bottom:22px;right:22px;transform:scale(-1)}

    .hrule{
      position:fixed;left:0;right:0;height:1px;z-index:4;
      background:linear-gradient(90deg,transparent 5%,rgba(255,255,255,.05) 28%,rgba(255,255,255,.05) 72%,transparent 95%);
    }
    .hrule.top{top:86px}
    .hrule.bot{bottom:46px}

    .scan{
      position:fixed;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(13,242,192,.045),transparent);
      z-index:5;pointer-events:none;
      animation:sc 10s linear infinite;
    }
    @keyframes sc{from{top:-2px}to{top:100vh}}

    .page{
      position:relative;z-index:10;
      height:100vh;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:0;padding:2rem;text-align:center;
    }

    .tag{
      display:inline-flex;align-items:center;gap:.55rem;
      font-size:.64rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
      color:var(--teal);margin-bottom:2.4rem;
      opacity:0;animation:up .9s .1s cubic-bezier(.22,1,.36,1) forwards;
    }
    .tag-dot{
      width:5px;height:5px;border-radius:50%;background:var(--teal);
      box-shadow:0 0 7px var(--teal);
      animation:blink 2s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

    h1{
      font-size:clamp(4.8rem,13.5vw,10rem);
      font-weight:900;line-height:.88;letter-spacing:-.045em;
      opacity:0;animation:up 1s .22s cubic-bezier(.22,1,.36,1) forwards;
    }
    h1 .w1{display:block;color:var(--ink)}
    h1 .w2{
      display:block;
      background:linear-gradient(118deg,var(--teal) 0%,var(--indigo) 42%,var(--coral) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      position:relative;
    }
    h1 .w2::after{
      content:attr(data-t);position:absolute;left:0;top:0;
      background:linear-gradient(118deg,var(--coral),var(--amber));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      opacity:0;clip-path:polygon(0 38%,100% 38%,100% 62%,0 62%);
      animation:glitch 7s 3s infinite;
    }
    @keyframes glitch{
      0%,92%,100%{opacity:0;transform:translate(0)}
      93%{opacity:.5;transform:translate(-5px,1px)}
      95%{opacity:.3;transform:translate(5px,-2px)}
      97%{opacity:.5;transform:translate(-2px,0)}
    }

    .serif-line{
      font-family:'Instrument Serif',serif;font-style:italic;
      font-size:clamp(1.15rem,2.6vw,1.85rem);
      color:var(--muted);margin-top:1.8rem;letter-spacing:-.01em;
      opacity:0;animation:up .9s .38s cubic-bezier(.22,1,.36,1) forwards;
    }
    .serif-line em{color:var(--ink);font-style:normal}

    .div-row{
      display:flex;align-items:center;gap:1.2rem;margin-top:2.8rem;
      opacity:0;animation:up .9s .5s cubic-bezier(.22,1,.36,1) forwards;
    }
    .dash{width:55px;height:1px;background:var(--gb)}
    .badge{
      font-size:.65rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
      color:var(--amber);
      border:1px solid rgba(255,179,71,.2);background:rgba(255,179,71,.05);
      padding:.38rem 1rem;border-radius:100px;
    }

    .steps{
      display:flex;align-items:center;gap:.9rem;margin-top:2.6rem;
      opacity:0;animation:up .9s .62s cubic-bezier(.22,1,.36,1) forwards;
    }
    .step{
      display:flex;flex-direction:column;align-items:center;gap:.4rem;
      padding:.8rem 1.3rem;
      border:1px solid var(--gb);border-radius:14px;
      background:var(--glass);backdrop-filter:blur(12px);
      transition:border-color .28s,transform .28s cubic-bezier(.22,1,.36,1);
      cursor:default;min-width:90px;
    }
    .step:hover{border-color:rgba(13,242,192,.28);transform:translateY(-5px)}
    .step-n{
      font-size:1.5rem;font-weight:900;letter-spacing:-.03em;
      background:linear-gradient(135deg,var(--teal),var(--indigo));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .step-l{
      font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
    }
    .step-sep{font-size:1rem;color:rgba(255,255,255,.08)}

    .ticker-wrap{
      position:fixed;bottom:0;left:0;right:0;z-index:7;height:38px;
      border-top:1px solid var(--gb);
      background:rgba(6,5,16,.8);backdrop-filter:blur(14px);
      overflow:hidden;display:flex;align-items:center;
    }
    .ticker{display:flex;white-space:nowrap;animation:tick 32s linear infinite}
    .ticker span{
      font-size:.56rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
      color:var(--muted);padding:0 2rem;
    }
    .ticker span.a{color:var(--teal)}
    @keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    @keyframes up{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<div id="cur-dot"></div>
<div id="cur-ring"></div>
<canvas id="bg"></canvas>
<div class="vig"></div>
<div class="grain"></div>
<div class="scan"></div>
<div class="br tl"></div>
<div class="br tr"></div>
<div class="br bl"></div>
<div class="br brx"></div>
<div class="hrule top"></div>
<div class="hrule bot"></div>

<div class="page">
  <div class="tag"><span class="tag-dot"></span>PixelByte &nbsp;·&nbsp; 2026</div>

  <h1>
    <span class="w1">Coming</span>
    <span class="w2" data-t="Soon">Soon</span>
  </h1>

  <p class="serif-line">We're crafting <em>something great</em></p>

  <div class="div-row">
    <div class="dash"></div>
    <div class="badge">In Development</div>
    <div class="dash"></div>
  </div>

  <div class="steps">
    <div class="step"><span class="step-n">01</span><span class="step-l">Design</span></div>
    <span class="step-sep">—</span>
    <div class="step"><span class="step-n">02</span><span class="step-l">Build</span></div>
    <span class="step-sep">—</span>
    <div class="step"><span class="step-n">03</span><span class="step-l">Launch</span></div>
  </div>
</div>

<div class="ticker-wrap">
  <div class="ticker">
    <span>PixelByte </span><span class="a">◆</span>
    <span>Coming Soon</span><span class="a">◆</span>
    <span>Crafting Something Great</span><span class="a">◆</span>
    <span>Digital Craft & Code</span><span class="a">◆</span>
    <span>Stay Tuned</span><span class="a">◆</span>
    <span>PixelByte </span><span class="a">◆</span>
    <span>Coming Soon</span><span class="a">◆</span>
    <span>Crafting Something Great</span><span class="a">◆</span>
    <span>Digital Craft & Code</span><span class="a">◆</span>
    <span>Stay Tuned</span><span class="a">◆</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* cursor */
const dot=document.getElementById('cur-dot'),ring=document.getElementById('cur-ring');
let dx=innerWidth/2,dy=innerHeight/2,rx=dx,ry=dy;
document.addEventListener('mousemove',e=>{dx=e.clientX;dy=e.clientY;dot.style.left=dx+'px';dot.style.top=dy+'px'});
(function lp(){rx+=(dx-rx)*.1;ry+=(dy-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(lp)})();
document.querySelectorAll('.step,.badge').forEach(el=>{
  el.addEventListener('mouseenter',()=>{ring.style.width='50px';ring.style.height='50px';ring.style.borderColor='rgba(13,242,192,.75)'});
  el.addEventListener('mouseleave',()=>{ring.style.width='32px';ring.style.height='32px';ring.style.borderColor='rgba(13,242,192,.4)'});
});

/* THREE.js */
const canvas=document.getElementById('bg');
const R=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.setSize(innerWidth,innerHeight);
R.setClearColor(0,0);

const S=new THREE.Scene();
const C=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,.1,300);
C.position.z=26;

/* lights */
S.add(new THREE.AmbientLight(0xffffff,.15));
const L1=new THREE.PointLight(0x0df2c0,5.5,95);  L1.position.set(-12,8,10);  S.add(L1);
const L2=new THREE.PointLight(0x7b5cfa,5,85);    L2.position.set(14,-6,8);   S.add(L2);
const L3=new THREE.PointLight(0xff5e7e,3.8,75);  L3.position.set(0,14,-4);   S.add(L3);
const L4=new THREE.PointLight(0xffb347,3,65);    L4.position.set(-8,-12,6);  S.add(L4);

const M=(c,o)=>new THREE.MeshPhysicalMaterial({color:c,transparent:true,opacity:o,roughness:.04,metalness:.04,transmission:.55,thickness:1.8,side:THREE.DoubleSide});
const W=(c,o)=>new THREE.MeshBasicMaterial({color:c,wireframe:true,transparent:true,opacity:o});

const objs=[];
const add=(geo,mat,x,y,z,spd,ax='y')=>{
  const m=new THREE.Mesh(geo,mat);
  m.position.set(x,y,z);
  m.userData={spd,ax,amp:.4+Math.random()*.8,off:Math.random()*Math.PI*2,oy:y};
  S.add(m);objs.push(m);
};

/* torus knot — left */
add(new THREE.TorusKnotGeometry(2.9,.68,200,18,2,3), M(0x0df2c0,.18), -11,3,-9, .0030);
add(new THREE.TorusKnotGeometry(2.9,.68,200,18,2,3), W(0x0df2c0,.07), -11,3,-9, .0030);
/* icosahedron — right */
add(new THREE.IcosahedronGeometry(2.5,1), M(0x7b5cfa,.20), 11,-2,-7, .0045);
add(new THREE.IcosahedronGeometry(2.5,1), W(0x7b5cfa,.07), 11,-2,-7, .0045);
/* octahedron — top right */
add(new THREE.OctahedronGeometry(2.0), M(0xff5e7e,.18), 10,7,-5, .0055);
/* torus ring — bottom left */
add(new THREE.TorusGeometry(2.5,.4,28,90), M(0xffb347,.15), -12,-6,-8, .004,'x');
/* far diamond */
const dm=new THREE.Mesh(new THREE.OctahedronGeometry(1.6),M(0x0df2c0,.11));
dm.scale.set(1,1.55,1);dm.position.set(0,0,-13);
dm.userData={spd:.0022,ax:'y',amp:.18,off:0,oy:0};S.add(dm);objs.push(dm);
/* accent spheres */
[[-4,8,-3],[5,7,-2],[7,-8,-5],[-7,-7,-4]].forEach(([x,y,z],i)=>{
  add(new THREE.SphereGeometry(.48+i*.07,32,32),M([0x0df2c0,0x7b5cfa,0xff5e7e,0xffb347][i],.35),x,y,z,.009+i*.002);
});
/* thin decorative rings */
add(new THREE.TorusGeometry(1.8,.045,10,80),W(0x0df2c0,.12), 6,6,-3,.007,'z');
add(new THREE.TorusGeometry(1.4,.038,10,60),W(0x7b5cfa,.10),-6,-8,-2,.009,'z');
/* background wireframe */
add(new THREE.TetrahedronGeometry(4.2),W(0x7b5cfa,.03),0,0,-17,.0012);

/* particles — multi-color */
const N=300,pg=new THREE.BufferGeometry();
const pp=new Float32Array(N*3),pc=new Float32Array(N*3);
const pal=[[.05,.95,.75],[.48,.36,.98],[1,.37,.49],[1,.70,.28]];
for(let i=0;i<N;i++){
  pp[i*3]=(Math.random()-.5)*62;pp[i*3+1]=(Math.random()-.5)*42;pp[i*3+2]=(Math.random()-.5)*24-4;
  const col=pal[Math.floor(Math.random()*4)];
  pc[i*3]=col[0];pc[i*3+1]=col[1];pc[i*3+2]=col[2];
}
pg.setAttribute('position',new THREE.BufferAttribute(pp,3));
pg.setAttribute('color',new THREE.BufferAttribute(pc,3));
const pts=new THREE.Points(pg,new THREE.PointsMaterial({size:.058,vertexColors:true,transparent:true,opacity:.55}));
S.add(pts);

/* interaction */
let mx=.5,my=.5,tmx=.5,tmy=.5;
document.addEventListener('mousemove',e=>{tmx=e.clientX/innerWidth;tmy=e.clientY/innerHeight});
const ray=new THREE.Raycaster(),ptr=new THREE.Vector2();
document.addEventListener('mousemove',e=>{ptr.x=(e.clientX/innerWidth)*2-1;ptr.y=-(e.clientY/innerHeight)*2+1});

const clk=new THREE.Clock();
(function loop(){
  requestAnimationFrame(loop);
  const t=clk.getElapsedTime();
  mx+=(tmx-mx)*.055;my+=(tmy-my)*.055;
  objs.forEach(m=>{
    const d=m.userData;
    m.rotation[d.ax]+=d.spd;m.rotation.x+=d.spd*.44;
    m.position.y=d.oy+Math.sin(t+d.off)*.65*d.amp;
  });
  pts.rotation.y+=.0007;pts.rotation.x+=.0003;
  L1.position.x=Math.sin(t*.36)*15; L1.position.y=Math.cos(t*.27)*10;
  L2.position.x=Math.cos(t*.31)*16; L2.position.y=Math.sin(t*.21)*10;
  L3.position.x=Math.sin(t*.19+1.4)*10; L3.position.z=Math.cos(t*.17)*8;
  L4.position.x=Math.cos(t*.24+2)*12;   L4.position.y=Math.sin(t*.29+1)*10;
  C.position.x+=((mx-.5)*7-C.position.x)*.038;
  C.position.y+=(-(my-.5)*4.5-C.position.y)*.038;
  C.lookAt(0,0,0);
  ray.setFromCamera(ptr,C);
  const hits=ray.intersectObjects(objs);
  objs.forEach(o=>{
    if(!o.material||o.material.opacity===undefined)return;
    if(hits.some(h=>h.object===o))o.material.opacity=Math.min(o.material.opacity+.03,.45);
  });
  R.render(S,C);
})();

addEventListener('resize',()=>{
  C.aspect=innerWidth/innerHeight;C.updateProjectionMatrix();
  R.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
