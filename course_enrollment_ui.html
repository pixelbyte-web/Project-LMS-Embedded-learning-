<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Enrollment System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #667eea;
      --purple-dark: #4f5fc4;
      --success: #28a745;
      --danger: #dc3545;
      --gray-50: #f8f9fa;
      --gray-100: #f1f3f5;
      --gray-300: #dee2e6;
      --gray-500: #6c757d;
      --gray-800: #343a40;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 28px 20px;
      color: var(--gray-800);
    }

    .container { max-width: 1200px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      background: #fff;
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .header h1 { font-size: 2rem; color: var(--purple); margin-bottom: 6px; }
    .header p  { color: var(--gray-500); font-size: 1rem; }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat {
      background: #fff;
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      text-align: center;
      transition: transform 0.2s;
    }
    .stat:hover { transform: translateY(-3px); }
    .stat-num   { font-size: 2.4rem; font-weight: 700; color: var(--purple); }
    .stat-label { font-size: 0.85rem; color: var(--gray-500); margin-top: 4px; }

    /* ── Controls ── */
    .controls {
      background: #fff;
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .control-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
    .control-group label { font-size: 0.8rem; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .04em; }
    select, input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--gray-300);
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fff;
      color: var(--gray-800);
      transition: border-color 0.2s;
      outline: none;
    }
    select:focus, input:focus { border-color: var(--purple); }

    /* ── Course grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.13); }

    .card-top {
      background: linear-gradient(135deg, var(--purple) 0%, #764ba2 100%);
      color: #fff;
      padding: 18px 20px 14px;
    }
    .card-tag {
      display: inline-block;
      background: rgba(255,255,255,0.22);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: .02em;
    }
    .card-title { font-size: 1.1rem; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
    .card-meta  { font-size: 0.8rem; opacity: 0.85; display: flex; justify-content: space-between; }

    .card-body { padding: 16px 20px; flex: 1; }
    .card-desc { font-size: 0.88rem; color: var(--gray-500); line-height: 1.65; }

    .card-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--gray-100);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
    }
    .badge-enrolled     { background: #d4edda; color: #155724; }
    .badge-not-enrolled { background: var(--gray-100); color: var(--gray-500); }

    .btn {
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-enroll   { background: var(--purple); color: #fff; }
    .btn-enroll:hover   { background: var(--purple-dark); }
    .btn-unenroll { background: #fff; color: var(--danger); border: 1.5px solid var(--danger); }
    .btn-unenroll:hover { background: #fff0f0; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Empty / loading ── */
    .msg {
      text-align: center;
      padding: 60px 20px;
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-size: 1rem;
      color: var(--gray-500);
    }
    .msg span { display: block; font-size: 2.5rem; margin-bottom: 12px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      max-width: 340px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.14);
      padding: 14px 20px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--gray-800);
      transform: translateX(120%);
      transition: transform 0.3s ease;
      z-index: 9999;
      border-left: 4px solid var(--purple);
    }
    .toast.show { transform: translateX(0); }
    .toast.error { border-left-color: var(--danger); }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.5rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>📚 Course Enrollment System</h1>
    <p>Browse available courses and manage enrollments</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-total">—</div><div class="stat-label">Total courses</div></div>
    <div class="stat"><div class="stat-num" id="s-enrolled">—</div><div class="stat-label">Enrolled</div></div>
    <div class="stat"><div class="stat-num" id="s-available">—</div><div class="stat-label">Available</div></div>
    <div class="stat"><div class="stat-num" id="s-students">—</div><div class="stat-label">Students</div></div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label for="student-sel">Student</label>
      <select id="student-sel" onchange="onStudentChange()">
        <option value="">Select a student…</option>
      </select>
    </div>
    <div class="control-group">
      <label for="search">Search</label>
      <input type="text" id="search" placeholder="Course name or topic…" oninput="renderGrid()" />
    </div>
    <div class="control-group" style="max-width:180px;">
      <label for="filter">Filter</label>
      <select id="filter" onchange="renderGrid()">
        <option value="all">All courses</option>
        <option value="enrolled">Enrolled only</option>
        <option value="available">Available only</option>
      </select>
    </div>
  </div>

  <div id="content">
    <div class="msg"><span>🎓</span>Select a student above to view and manage enrollments.</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:5000';

  // ── State ─────────────────────────────────────────────────────────────────
  let courses    = [];
  let students   = [];
  let myEnrolled = [];   // array of course_id ints
  let currentId  = null;

  // ── Boot ──────────────────────────────────────────────────────────────────
  async function boot() {
    await Promise.all([loadStudents(), loadCourses()]);
    updateGlobalStats();
  }

  async function loadStudents() {
    try {
      const r = await fetch(`${API}/students`);
      const d = await r.json();
      students = d.students || [];
      document.getElementById('s-students').textContent = students.length;
      const sel = document.getElementById('student-sel');
      students.forEach(s => {
        const o = document.createElement('option');
        o.value = s.id;
        o.textContent = `${s.first_name} ${s.last_name}`;
        sel.appendChild(o);
      });
    } catch {
      toast('Could not reach API. Is the backend running?', true);
    }
  }

  async function loadCourses() {
    try {
      const r = await fetch(`${API}/courses`);
      const d = await r.json();
      courses = d.courses || [];
      document.getElementById('s-total').textContent = courses.length;
    } catch { /* error handled in loadStudents */ }
  }

  // ── Student change ────────────────────────────────────────────────────────
  async function onStudentChange() {
    currentId = parseInt(document.getElementById('student-sel').value) || null;
    myEnrolled = [];
    if (!currentId) { renderGrid(); return; }

    try {
      const r = await fetch(`${API}/enrollments/${currentId}`);
      const d = await r.json();
      myEnrolled = (d.enrollments || []).map(e => e.course_id);
    } catch {
      toast('Failed to load enrollments.', true);
    }
    updateGlobalStats();
    renderGrid();
  }

  // ── Enroll / unenroll ─────────────────────────────────────────────────────
  async function enroll(courseId) {
    if (!currentId) return;
    try {
      const r = await fetch(`${API}/enroll`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student_id: currentId, course_id: courseId }),
      });
      const d = await r.json();
      if (!r.ok) { toast(d.error || 'Enrollment failed.', true); return; }
      myEnrolled.push(courseId);
      const c = courses.find(c => c.id === courseId);
      if (c) c.enrolled_students++;
      toast(d.message);
      updateGlobalStats();
      renderGrid();
    } catch { toast('Network error.', true); }
  }

  async function unenroll(courseId) {
    if (!currentId) return;
    try {
      const r = await fetch(`${API}/unenroll`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student_id: currentId, course_id: courseId }),
      });
      const d = await r.json();
      if (!r.ok) { toast(d.error || 'Unenrollment failed.', true); return; }
      myEnrolled = myEnrolled.filter(id => id !== courseId);
      const c = courses.find(c => c.id === courseId);
      if (c) c.enrolled_students--;
      toast('Removed from course.');
      updateGlobalStats();
      renderGrid();
    } catch { toast('Network error.', true); }
  }

  // ── Render ────────────────────────────────────────────────────────────────
  const TAGS = {
    'Introduction to Programming': 'Programming',
    'Web Development Fundamentals': 'Web',
    'Database Management Systems': 'Database',
    'Data Structures and Algorithms': 'CS Fundamentals',
    'Mobile App Development': 'Mobile',
    'Machine Learning Basics': 'AI / ML',
    'Cybersecurity Fundamentals': 'Security',
    'Cloud Computing with AWS': 'Cloud',
  };

  function renderGrid() {
    const q      = document.getElementById('search').value.toLowerCase();
    const filter = document.getElementById('filter').value;
    const content = document.getElementById('content');

    if (!courses.length) {
      content.innerHTML = '<div class="msg"><span>⚙️</span>Loading courses…</div>';
      return;
    }

    if (!currentId) {
      content.innerHTML = '<div class="msg"><span>🎓</span>Select a student above to view and manage enrollments.</div>';
      return;
    }

    let list = courses.filter(c => {
      const matchQ = !q || c.title.toLowerCase().includes(q) || (c.description || '').toLowerCase().includes(q);
      const isEnrolled = myEnrolled.includes(c.id);
      const matchF = filter === 'all' || (filter === 'enrolled' && isEnrolled) || (filter === 'available' && !isEnrolled);
      return matchQ && matchF;
    });

    if (!list.length) {
      content.innerHTML = '<div class="msg"><span>🔍</span>No courses match your search.</div>';
      return;
    }

    content.innerHTML = `<div class="grid">${list.map(cardHTML).join('')}</div>`;
  }

  function cardHTML(c) {
    const enrolled  = myEnrolled.includes(c.id);
    const tag       = TAGS[c.title] || 'Course';
    const disabled  = !currentId ? 'disabled' : '';

    const badge = enrolled
      ? '<span class="badge badge-enrolled">✓ Enrolled</span>'
      : '<span class="badge badge-not-enrolled">Not enrolled</span>';

    const btn = enrolled
      ? `<button class="btn btn-unenroll" onclick="unenroll(${c.id})" ${disabled}>Unenroll</button>`
      : `<button class="btn btn-enroll"   onclick="enroll(${c.id})"   ${disabled}>Enroll now</button>`;

    return `
      <div class="card">
        <div class="card-top">
          <div class="card-tag">${tag}</div>
          <div class="card-title">${c.title}</div>
          <div class="card-meta">
            <span>👥 ${c.enrolled_students} enrolled</span>
            <span>ID #${c.id}</span>
          </div>
        </div>
        <div class="card-body"><p class="card-desc">${c.description || ''}</p></div>
        <div class="card-footer">${badge}${btn}</div>
      </div>`;
  }

  function updateGlobalStats() {
    document.getElementById('s-enrolled').textContent  = currentId ? myEnrolled.length : '—';
    document.getElementById('s-available').textContent = currentId ? courses.length - myEnrolled.length : '—';
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Start ─────────────────────────────────────────────────────────────────
  boot();
</script>
</body>
</html>
